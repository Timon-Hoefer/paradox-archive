<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chapter V — The Observer's Vault</title>
  <style>
    :root{--void:#070a0c;--ink:#e8ebe5;--muted:#737c76;--line:rgba(232,235,229,.13);--green:#82e897;--gold:#ffcb66}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--void);color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}body{min-height:100dvh;overflow:hidden;background:radial-gradient(circle at 50% 42%,rgba(130,232,151,.055),transparent 34%),var(--void)}
    .topbar{position:fixed;z-index:5;left:0;right:0;top:0;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 30px;border-bottom:1px solid var(--line);color:var(--muted);font-size:10px;letter-spacing:.15em;text-transform:uppercase}.brand{display:flex;align-items:center;gap:10px;color:var(--ink)}.brand-mark{width:8px;height:8px;border:1px solid var(--green);transform:rotate(45deg);box-shadow:0 0 12px rgba(130,232,151,.3)}.seals{display:flex;gap:7px}.seal{width:7px;height:7px;border:1px solid rgba(232,235,229,.22);border-radius:50%}.seal.done{background:#68706b}.seal.active{border-color:var(--green);background:var(--green);box-shadow:0 0 12px rgba(130,232,151,.55)}
    .vault{position:relative;min-height:100dvh;display:grid;grid-template-columns:minmax(260px,.8fr) minmax(300px,1.2fr);align-items:center;gap:clamp(38px,7vw,110px);width:min(1040px,calc(100% - 48px));margin:auto;padding:92px 0 44px}.copy{align-self:center}.kicker{margin:0 0 15px;color:var(--green);font-size:10px;letter-spacing:.18em;text-transform:uppercase}.copy h1{max-width:470px;margin:0;font-family:Inter,ui-sans-serif,system-ui,sans-serif;font-size:clamp(43px,6vw,76px);font-weight:630;line-height:.92;letter-spacing:-.055em}.copy p{max-width:470px;margin:24px 0 0;color:var(--muted);font-size:14px;line-height:1.7}.apparatus{position:relative;display:grid;justify-items:center;align-content:center;min-height:590px}.eye-shell{position:relative;width:150px;height:82px;margin-bottom:34px;border:1px solid rgba(130,232,151,.28);border-radius:100% 0 100% 0;transform:rotate(45deg);background:#080d0a;box-shadow:0 0 45px rgba(130,232,151,.06);overflow:hidden}.iris{position:absolute;left:50%;top:50%;width:54px;height:54px;border:1px solid rgba(130,232,151,.62);border-radius:50%;transform:translate(calc(-50% + var(--pupil-x,0px)),calc(-50% + var(--pupil-y,0px))) rotate(-45deg);transition:transform .08s linear;box-shadow:inset 0 0 20px rgba(130,232,151,.12),0 0 18px rgba(130,232,151,.08)}.pupil{position:absolute;inset:17px;border-radius:50%;background:var(--green);box-shadow:0 0 16px rgba(130,232,151,.65)}.lid{position:absolute;z-index:2;inset:-3px;background:#080d0a;transform:translateY(-105%);transition:transform .7s ease}.door-frame{position:relative;width:min(310px,72vw);height:390px;border:1px solid rgba(232,235,229,.17);border-bottom:0;border-radius:155px 155px 0 0;padding:28px 25px 0;box-shadow:0 0 0 16px rgba(232,235,229,.018),0 42px 80px rgba(0,0,0,.5);perspective:900px}.door{position:relative;width:100%;height:100%;border:1px solid rgba(130,232,151,.22);border-bottom:0;border-radius:130px 130px 0 0;background:radial-gradient(circle at 50% 35%,rgba(130,232,151,.055),transparent 27%),repeating-linear-gradient(90deg,transparent 0 24%,rgba(232,235,229,.025) 24% 24.5%),#080b0a;transform-origin:0 50%}.lock{position:absolute;left:50%;top:55%;width:48px;height:48px;display:grid;place-items:center;border:1px solid rgba(255,203,102,.34);border-radius:50%;color:rgba(255,203,102,.62);transform:translate(-50%,-50%);font-size:15px;box-shadow:0 0 20px rgba(255,203,102,.05)}.state{margin-top:28px;color:#536059;font-size:10px;letter-spacing:.15em;text-transform:uppercase}.state::before{content:"";display:inline-block;width:5px;height:5px;margin-right:9px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);vertical-align:1px}
    body.solved .lid{transform:translateY(0)}body.solved .iris{transition-duration:.4s;transform:translate(-50%,-50%) rotate(-45deg)}body.solved .door{animation:openDoor 1.15s .55s cubic-bezier(.2,.75,.2,1) forwards}body.solved .lock{animation:releaseLock .6s ease forwards}body.solved .state::before{background:var(--gold);box-shadow:0 0 10px var(--gold)}
    .epilogue{position:fixed;z-index:20;inset:0;display:grid;place-items:center;padding:28px;background:radial-gradient(circle at 50% 26%,rgba(130,232,151,.13),transparent 32%),rgba(7,10,12,.97);opacity:0;visibility:hidden;transition:opacity .7s ease,visibility .7s}.epilogue-inner{width:min(700px,100%);text-align:center;transform:translateY(14px);transition:transform .7s ease}.epilogue-label{color:var(--green);font-size:10px;letter-spacing:.17em;text-transform:uppercase}.epilogue h2{margin:14px 0 17px;font-family:Inter,ui-sans-serif,system-ui,sans-serif;font-size:clamp(42px,7vw,74px);line-height:.96;letter-spacing:-.05em}.epilogue p{margin:0;color:var(--muted);font-size:15px;line-height:1.65}.next-link{display:inline-block;margin-top:28px;padding:14px 22px;border:1px solid var(--green);border-radius:2px;background:rgba(130,232,151,.06);color:var(--green);text-decoration:none;font-size:12px;letter-spacing:.06em;text-transform:lowercase}body.complete .epilogue{opacity:1;visibility:visible}body.complete .epilogue-inner{transform:none}
    @keyframes openDoor{0%{transform:rotateY(0)}100%{transform:rotateY(-105deg);filter:brightness(.55)}}@keyframes releaseLock{55%{opacity:1;transform:translate(-50%,-50%) scale(1.25);filter:brightness(1.8)}100%{opacity:0;transform:translate(-50%,-50%) scale(.4)}}
    @media(max-width:720px){.topbar{padding:0 16px}.chapter{display:none}.vault{grid-template-columns:1fr;align-content:center;gap:24px;width:min(100% - 30px,520px);padding:78px 0 24px}.copy{text-align:center}.copy h1{margin:auto;font-size:clamp(37px,11vw,54px)}.copy p{margin:17px auto 0;font-size:12px}.apparatus{min-height:420px}.eye-shell{width:112px;height:62px;margin-bottom:21px}.iris{width:42px;height:42px}.pupil{inset:13px}.door-frame{width:min(235px,65vw);height:285px;padding:21px 19px 0}.state{margin-top:20px}}
    @media(max-height:650px) and (max-width:720px){.copy p{display:none}.vault{grid-template-columns:.8fr 1.2fr;gap:20px}.copy h1{font-size:32px}.apparatus{min-height:0}.eye-shell{width:90px;height:50px;margin-bottom:14px}.door-frame{width:180px;height:230px}.state{margin-top:13px}}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <header class="topbar"><div class="brand"><span class="brand-mark"></span>The Paradox Archive</div><div class="chapter">Chapter 05 · The Observer's Vault</div><div class="seals"><span class="seal done"></span><span class="seal done"></span><span class="seal done"></span><span class="seal done"></span><span class="seal active"></span><span class="seal"></span></div></header>
  <main class="vault">
    <section class="copy" aria-labelledby="vault-title"><p class="kicker">archive://node_05</p><h1 id="vault-title">The Observer's Vault</h1><p>The archive knows when it is being watched.</p></section>
    <section class="apparatus" aria-label="A watched and sealed vault door"><div class="eye-shell" id="eye"><span class="lid"></span><span class="iris"><span class="pupil"></span></span></div><div class="door-frame"><div class="door"><span class="lock">◇</span></div></div><div class="state" id="state" aria-live="polite">observation://active</div></section>
  </main>
  <section class="epilogue" aria-labelledby="solved-title"><div class="epilogue-inner"><div class="epilogue-label">node_05 // observer absent</div><h2 id="solved-title">Unseen, the lock released.</h2><p>The vault could not remain certain without a witness.</p><a class="next-link" href="the-final-question.html">Open final query →</a></div></section>
  <script src="observer-runtime.min.js"></script>
  <script src="i18n.js"></script>
</body>
</html>
