<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chapter V — The Final Question</title>
  <style>
    :root{--black:#000;--ink:#e8e8e8;--muted:#777;--line:#171717;--blue:#69c8ff;--gold:#ffcb66}
    *{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;background:#000;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{min-height:100dvh;overflow:hidden}button,input,textarea{font:inherit}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    .field{position:fixed;inset:0;background:#000;cursor:crosshair}.field canvas{display:block;width:100%;height:100%}
    .topbar{position:fixed;z-index:5;left:0;right:0;top:0;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 30px;border-bottom:1px solid var(--line);color:#5f5f5f;font:700 10px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:.15em;text-transform:uppercase;pointer-events:none}.brand{display:flex;align-items:center;gap:10px;color:#999}.brand-mark{width:8px;height:8px;border:1px solid #555;transform:rotate(45deg)}.seals{display:flex;gap:7px}.seal{width:7px;height:7px;border:1px solid #272727;border-radius:50%}.seal.done{background:#555}.seal.active{border-color:var(--gold);background:var(--gold);box-shadow:0 0 12px rgba(255,203,102,.45)}
    .question{position:fixed;z-index:4;inset:58px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:clamp(44px,8vh,90px) 24px 38px;text-align:center;pointer-events:none}.copy{width:min(820px,100%);pointer-events:auto}.kicker{margin:0 0 17px;color:#777;font:700 11px/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:.18em;text-transform:uppercase}.question h1{margin:0;font-size:clamp(36px,6.4vw,76px);line-height:.98;letter-spacing:-.055em;font-weight:650}.answer{width:min(520px,100%);pointer-events:auto}.form{display:flex;gap:9px;padding:7px;border:1px solid #202020;border-radius:999px;background:rgba(0,0,0,.86);transition:border-color .25s,transform .25s}.form:focus-within{border-color:#4a4a4a}.form.wrong{animation:wrong .36s ease;border-color:#6b2730}.input{min-width:0;flex:1;border:0;outline:0;padding:10px 10px 10px 17px;background:transparent;color:#ddd;font-size:17px;letter-spacing:.08em}.input::placeholder{color:#333}.submit{border:1px solid #353535;border-radius:999px;padding:10px 18px;background:#111;color:#aaa;cursor:pointer;font-weight:750;letter-spacing:.08em;text-transform:uppercase}.submit:hover{border-color:#777;color:#eee}.submit:disabled{cursor:wait;opacity:.55}.status{min-height:20px;margin:11px 0 0;color:#666;font:600 11px/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:.08em}
    .ending{position:fixed;z-index:8;inset:0;display:grid;align-items:start;padding:44px 20px;overflow-y:auto;background:radial-gradient(circle at 50% 28%,rgba(105,200,255,.13),transparent 25%),rgba(0,0,0,.86);opacity:0;visibility:hidden;transition:opacity 1s .7s,visibility 0s 1.7s;text-align:center;pointer-events:none}body.solved .ending{opacity:1;visibility:visible;transition:opacity 1s .7s,visibility 0s;pointer-events:auto}.ending-inner{width:min(760px,100%);margin:auto;transform:translateY(18px);transition:transform 1s .75s}body.solved .ending-inner{transform:none}.ending-label{color:var(--gold);font:700 11px/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:.2em;text-transform:uppercase}.ending h2{position:relative;display:inline-block;min-height:.86em;margin:8px 0 10px;font-size:clamp(62px,10vw,112px);line-height:.86;letter-spacing:-.08em}.ending h2::after{content:"";position:absolute;left:50%;top:50%;width:1em;height:1em;border:1px solid var(--blue);border-radius:50%;opacity:0;transform:translate(-50%,-50%) scale(.3);pointer-events:none}body.solved .ending h2{animation:answer-lock 1s 1.05s cubic-bezier(.2,.9,.25,1) both}body.solved .ending h2::after{animation:answer-ring .85s 1.4s ease-out both}.completion{margin:0;color:#aaa;font-size:clamp(16px,2vw,20px)}.reference{max-width:650px;margin:24px auto 0!important;padding:18px 20px;border:1px solid #252525;border-radius:14px;background:rgba(255,255,255,.025);color:#8f8f8f!important;font-size:15px!important;line-height:1.6}.reference strong{color:var(--blue)}
    .fame{margin-top:28px;padding-top:25px;border-top:1px solid #242424;text-align:left}.fame-head{display:flex;align-items:end;justify-content:space-between;gap:18px;margin-bottom:15px}.fame h3{margin:0;font-size:25px;letter-spacing:-.03em}.fame-note{margin:0!important;color:#555!important;font:600 10px/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace!important;letter-spacing:.1em;text-transform:uppercase}.fame-form{display:grid;grid-template-columns:minmax(120px,.75fr) minmax(180px,1.5fr) auto;gap:8px;align-items:stretch}.fame-input,.fame-comment{width:100%;border:1px solid #2c2c2c;border-radius:11px;outline:0;background:#090909;color:#ddd;padding:12px 13px}.fame-input:focus,.fame-comment:focus{border-color:#666}.fame-comment{resize:none;min-height:47px;max-height:90px}.fame-save{border:1px solid var(--gold);border-radius:11px;background:var(--gold);color:#171005;padding:0 18px;cursor:pointer;font-weight:800;letter-spacing:.06em;text-transform:uppercase}.fame-meta{display:flex;justify-content:space-between;gap:16px;min-height:18px;margin-top:7px;color:#555;font:600 10px/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:.08em}.fame-list{display:grid;gap:7px;max-height:min(310px,40vh);margin:17px 0 0;padding:0 6px 0 0;overflow-y:auto;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:#3d4d42 transparent;list-style:none}.fame-entry{display:grid;grid-template-columns:minmax(100px,.7fr) minmax(160px,1.5fr) auto;gap:14px;align-items:center;padding:12px 14px;border-bottom:1px solid #1d1d1d}.fame-name{color:#ddd;font-weight:750;overflow-wrap:anywhere}.fame-quote{color:#777;line-height:1.45;overflow-wrap:anywhere}.fame-date{color:#444;font:600 10px/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:nowrap}.fame-empty{padding:17px 2px;color:#4d4d4d;font-style:italic}.fame-form.locked{opacity:.42;filter:grayscale(1)}.fame-form.locked .fame-input,.fame-form.locked .fame-comment,.fame-form.locked .fame-save{cursor:not-allowed}body.solved .question,body.solved .topbar{opacity:0;transition:opacity .55s}
    @keyframes wrong{0%,100%{transform:translateX(0)}30%{transform:translateX(-8px)}65%{transform:translateX(8px)}}
    @keyframes answer-lock{0%{opacity:0;filter:blur(7px);transform:scale(.76);text-shadow:0 0 0 transparent}58%{opacity:1;filter:blur(0);transform:scale(1.08);text-shadow:0 0 32px rgba(105,200,255,.82)}100%{opacity:1;filter:blur(0);transform:scale(1);text-shadow:0 0 12px rgba(105,200,255,.28)}}
    @keyframes answer-ring{0%{opacity:.8;transform:translate(-50%,-50%) scale(.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(2.05)}}
    @media(max-width:650px){.topbar{padding:0 16px}.chapter{display:none}.question{padding:34px 17px 24px}.form{border-radius:25px}.submit{padding-inline:14px}.ending{padding:30px 15px}.fame-head{display:block}.fame-note{margin-top:6px!important}.fame-form{grid-template-columns:1fr}.fame-save{min-height:44px}.fame-entry{grid-template-columns:1fr;gap:4px}.fame-date{white-space:normal}}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <div class="field" id="field"><canvas id="canvas" role="img" aria-label="A black field containing an almost invisible pixel pattern"></canvas></div>
  <header class="topbar"><div class="brand"><span class="brand-mark"></span>The Paradox Archive</div><div class="chapter">Chapter 05 · The Final Question</div><div class="seals"><span class="seal done"></span><span class="seal done"></span><span class="seal done"></span><span class="seal done"></span><span class="seal active"></span></div></header>
  <main class="question">
    <section class="copy" aria-labelledby="question-title"><p class="kicker">archive://final_query</p><h1 id="question-title">What is the answer to life,<br>the universe, and everything?</h1></section>
    <section class="answer"><form class="form" id="form"><label class="sr-only" for="answer">Your answer</label><input class="input" id="answer" name="answer" inputmode="numeric" autocomplete="off" placeholder="Enter the answer" aria-describedby="status"><button class="submit" type="submit">Answer</button></form><p class="status" id="status" aria-live="polite"></p></section>
  </main>
  <section class="ending" aria-labelledby="ending-title"><div class="ending-inner"><div class="ending-label">archive // unlocked</div><h2 id="ending-title" aria-live="polite"></h2><p class="completion" id="completion"></p><p class="reference"><strong id="reference-label"></strong> <span id="reference-body"></span></p><section class="fame" aria-labelledby="fame-title"><div class="fame-head"><h3 id="fame-title">Hall of Fame</h3><p class="fame-note">Newest travellers appear first</p></div><form class="fame-form" id="fame-form"><label class="sr-only" for="fame-name">Name</label><input class="fame-input" id="fame-name" maxlength="30" autocomplete="name" placeholder="Your name" required><label class="sr-only" for="fame-comment">Comment</label><textarea class="fame-comment" id="fame-comment" maxlength="100" placeholder="Your comment · max. 100 characters" required></textarea><button class="fame-save" type="submit">Join</button></form><div class="fame-meta"><span id="fame-status" aria-live="polite"></span><span id="fame-count">0 / 100</span></div><ol class="fame-list" id="fame-list"></ol></section></div></section>
  <script>
    (()=>{
      const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),form=document.getElementById('form'),input=document.getElementById('answer'),submit=form.querySelector('.submit'),status=document.getElementById('status'),endingTitle=document.getElementById('ending-title'),completion=document.getElementById('completion'),referenceLabel=document.getElementById('reference-label'),referenceBody=document.getElementById('reference-body'),fameForm=document.getElementById('fame-form'),fameName=document.getElementById('fame-name'),fameComment=document.getElementById('fame-comment'),fameStatus=document.getElementById('fame-status'),fameCount=document.getElementById('fame-count'),fameList=document.getElementById('fame-list');
      const pointer={x:-9999,y:-9999,lastX:null,lastY:null,active:false,down:false},signal=new Image();
      const copy={
        en:{checking:'Checking…',closed:'The archive remains closed.',limited:'Too many attempts. Wait a moment.',offline:'The archive server is unavailable.',saving:'Recording…',sealed:'Your place in the archive is sealed.',locked:'Entry locked',recorded:'Recorded',empty:'Be the first name in the archive.',hallOffline:'The Hall of Fame is unavailable.'},
        de:{checking:'Prüfung läuft…',closed:'Das Archiv bleibt geschlossen.',limited:'Zu viele Versuche. Warte einen Moment.',offline:'Der Archivserver ist nicht erreichbar.',saving:'Wird eingetragen…',sealed:'Dein Platz im Archiv ist besiegelt.',locked:'Eintrag gesperrt',recorded:'Eingetragen',empty:'Sei der erste Name im Archiv.',hallOffline:'Die Ruhmeshalle ist nicht erreichbar.'}
      };
      let trails=[],circles=[],holdTimer=0,solved=false,reveal=0,revealStart=0,dpr=1,signalReady=false,signalBox={x:0,y:0,w:11,h:7},revealContent=null,hallState={entries:[],solved:false,joined:false,canJoin:false};
      const language=()=>document.documentElement.lang==='de'?'de':'en';
      const message=key=>copy[language()][key];

      function layout(){
        dpr=Math.min(devicePixelRatio||1,2);canvas.width=Math.round(innerWidth*dpr);canvas.height=Math.round(innerHeight*dpr);canvas.style.width=`${innerWidth}px`;canvas.style.height=`${innerHeight}px`;ctx.setTransform(dpr,0,0,dpr,0,0);
        signalBox={x:Math.max(22,Math.min(innerWidth-33,innerWidth*.19)),y:Math.max(125,Math.min(innerHeight-112,innerHeight*.59)),w:11,h:7};draw();
      }
      function draw(){
        ctx.fillStyle='rgb(0,0,0)';ctx.fillRect(0,0,innerWidth,innerHeight);ctx.save();ctx.globalCompositeOperation='screen';ctx.lineCap='round';
        for(const trail of trails){ctx.beginPath();ctx.moveTo(trail.x1,trail.y1);ctx.lineTo(trail.x2,trail.y2);ctx.strokeStyle=`hsla(${trail.hue},92%,62%,.22)`;ctx.shadowColor=`hsla(${trail.hue},95%,58%,.55)`;ctx.shadowBlur=9;ctx.lineWidth=trail.width;ctx.stroke();ctx.shadowBlur=0;ctx.lineWidth=Math.max(1,trail.width*.28);ctx.strokeStyle=`hsla(${(trail.hue+38)%360},100%,78%,.38)`;ctx.stroke()}
        for(const circle of circles){ctx.beginPath();ctx.arc(circle.x,circle.y,circle.radius,0,Math.PI*2);ctx.strokeStyle=`hsla(${circle.hue},96%,62%,.72)`;ctx.shadowColor=`hsla(${circle.hue},100%,58%,.9)`;ctx.shadowBlur=22;ctx.lineWidth=circle.width;ctx.stroke();ctx.shadowBlur=0;ctx.lineWidth=3;ctx.strokeStyle=`hsla(${(circle.hue+45)%360},100%,86%,.82)`;ctx.stroke()}
        ctx.restore();
        const radius=Math.max(58,Math.min(94,innerWidth*.075)),cx=signalBox.x+signalBox.w/2,cy=signalBox.y+signalBox.h/2,distance=Math.hypot(pointer.x-cx,pointer.y-cy),hover=pointer.active&&distance<radius?(1-distance/radius)**2:0;
        if(signalReady){ctx.save();ctx.imageSmoothingEnabled=false;ctx.filter=`brightness(${1+hover*16+reveal*44})`;ctx.drawImage(signal,signalBox.x,signalBox.y,signalBox.w,signalBox.h);ctx.restore()}
        if(pointer.active&&!solved){const gradient=ctx.createRadialGradient(pointer.x,pointer.y,4,pointer.x,pointer.y,radius);gradient.addColorStop(0,'rgba(255,255,255,.035)');gradient.addColorStop(.72,'rgba(255,255,255,.008)');gradient.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=gradient;ctx.beginPath();ctx.arc(pointer.x,pointer.y,radius,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=1;ctx.stroke()}
      }
      function animate(time){if(!revealStart)revealStart=time;reveal=Math.min(1,(time-revealStart)/950);draw();if(reveal<1)requestAnimationFrame(animate)}
      function applyReveal(){if(!revealContent)return;const content=revealContent[language()]||revealContent.en;endingTitle.textContent=content.headline;completion.textContent=content.completion;referenceLabel.textContent=content.factLabel;referenceBody.textContent=content.fact;document.title=`${content.headline} — The Paradox Archive`}
      function unlock(content,resumed=false){if(!content)return;revealContent=content;applyReveal();solved=true;document.body.classList.add('solved');status.textContent='';if(resumed){reveal=1;draw()}else{revealStart=0;requestAnimationFrame(animate)}setTimeout(()=>{if(hallState.canJoin)fameName.focus({preventScroll:true})},resumed?100:1200)}
      function setFameLocked(locked){fameForm.classList.toggle('locked',locked);for(const control of fameForm.elements)control.disabled=locked;fameForm.querySelector('button').textContent=locked?message('recorded'):(language()==='de'?'Eintragen':'Join');if(locked){fameStatus.textContent=message('sealed');fameCount.textContent=message('locked')}}
      function renderHall(){
        fameList.replaceChildren();const entries=Array.isArray(hallState.entries)?hallState.entries.slice(0,50):[];
        if(!entries.length){const empty=document.createElement('li');empty.className='fame-empty';empty.textContent=message('empty');fameList.appendChild(empty)}
        for(const entry of entries){const item=document.createElement('li'),name=document.createElement('span'),quote=document.createElement('span'),date=document.createElement('time');item.className='fame-entry';name.className='fame-name';quote.className='fame-quote';date.className='fame-date';name.textContent=entry.name;quote.textContent=entry.comment;date.dateTime=entry.at;date.textContent=new Date(entry.at).toLocaleString(language()==='de'?'de-DE':'en-GB',{dateStyle:'medium',timeStyle:'short'});item.append(name,quote,date);fameList.appendChild(item)}
        setFameLocked(Boolean(hallState.joined||hallState.solved&&!hallState.canJoin));
      }
      async function api(path,options={}){const response=await fetch(path,{credentials:'same-origin',...options,headers:{Accept:'application/json',...(options.headers||{})}});let data={};try{data=await response.json()}catch{}return{response,data}}
      async function loadHall(restore=false){
        try{const{response,data}=await api('/api/hall-of-fame');if(!response.ok)throw new Error(data.error||'hall');hallState=data;renderHall();if(restore&&data.solved&&data.reveal&&!solved)unlock(data.reveal,true)}catch{if(solved){fameStatus.textContent=message('hallOffline');hallState={...hallState,canJoin:false};renderHall()}}
      }
      function wrong(){form.classList.remove('wrong');void form.offsetWidth;form.classList.add('wrong');status.textContent=message('closed');input.select()}
      function stopDrawing(){clearTimeout(holdTimer);holdTimer=0;pointer.down=false;pointer.lastX=pointer.lastY=null}
      function startDrawing(event){if(solved||event.target.closest?.('input,textarea,button,form'))return;clearTimeout(holdTimer);pointer.down=true;pointer.active=true;pointer.x=pointer.lastX=event.clientX;pointer.y=pointer.lastY=event.clientY;holdTimer=setTimeout(()=>{if(!pointer.down||solved)return;circles.push({x:pointer.x,y:pointer.y,radius:44,width:15,hue:(Date.now()/18)%360});if(circles.length>24)circles.shift();draw()},5000)}

      addEventListener('resize',layout);addEventListener('pointerdown',startDrawing);addEventListener('pointermove',event=>{if(pointer.down&&pointer.lastX!==null){const distance=Math.hypot(event.clientX-pointer.lastX,event.clientY-pointer.lastY);if(distance>1){trails.push({x1:pointer.lastX,y1:pointer.lastY,x2:event.clientX,y2:event.clientY,hue:(Date.now()/18+trails.length*11)%360,width:Math.min(10,2.2+distance*.11)});if(trails.length>240)trails.splice(0,trails.length-240)}pointer.lastX=event.clientX;pointer.lastY=event.clientY}pointer.x=event.clientX;pointer.y=event.clientY;pointer.active=true;if(!solved)draw()},{passive:true});addEventListener('pointerup',stopDrawing);addEventListener('pointercancel',stopDrawing);addEventListener('blur',stopDrawing);addEventListener('pointerleave',()=>{stopDrawing();pointer.active=false;if(!solved)draw()});
      document.addEventListener('paradox:languagechange',()=>{applyReveal();renderHall()});
      fameComment.addEventListener('input',()=>{fameCount.textContent=`${Array.from(fameComment.value).length} / 100`});
      fameForm.addEventListener('submit',async event=>{event.preventDefault();if(!hallState.canJoin){setFameLocked(true);return}const name=fameName.value.trim().replace(/\s+/g,' '),comment=fameComment.value.trim().replace(/\s+/g,' ');if(!name||!comment)return;for(const control of fameForm.elements)control.disabled=true;fameStatus.textContent=message('saving');try{const{response,data}=await api('/api/hall-of-fame',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,comment})});if(response.ok){hallState=data;renderHall();return}if(response.status===409){hallState={...hallState,joined:true,canJoin:false};renderHall();return}throw new Error(data.error||'save')}catch{fameStatus.textContent=message('hallOffline');for(const control of fameForm.elements)control.disabled=false}});
      form.addEventListener('submit',async event=>{event.preventDefault();if(solved)return;submit.disabled=true;status.textContent=message('checking');try{const{response,data}=await api('/api/check-answer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({answer:input.value})});if(response.status===429){status.textContent=message('limited');input.select();return}if(!response.ok){status.textContent=message('offline');return}if(!data.correct){wrong();return}unlock(data.reveal);await loadHall(false)}catch{status.textContent=message('offline')}finally{submit.disabled=false}});

      signal.onload=()=>{signalReady=true;layout()};signal.src='archive-signal.png';layout();loadHall(true);setTimeout(()=>input.focus({preventScroll:true}),250);
    })();
  </script>
  <script src="i18n.js"></script>
</body>
</html>
