<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#07090f">
  <meta name="description" content="A visual journey through mathematical riddles. Observe the room, infer its rules, and find the hidden way forward.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="The Paradox Archive">
  <meta property="og:description" content="A visual journey through mathematical riddles.">
  <title>The Paradox Archive — Zeno's Gate</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f3f0e8;
      --muted: #9d9a91;
      --line: rgba(243, 240, 232, .16);
      --panel: rgba(15, 18, 28, .78);
      --acid: #d8ff62;
      --violet: #8a78ff;
      --void: #07090f;
      --danger: #ff6b75;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: var(--void); }

    body { color: var(--ink); background: var(--void); }

    button { font: inherit; }

    .game {
      position: relative;
      width: 100%;
      height: 100dvh;
      min-height: 100%;
      isolation: isolate;
    }

    .grid {
      position: absolute;
      inset: 0;
      z-index: -2;
      opacity: .42;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 48px 48px;
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,.85), transparent 88%);
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.85), transparent 88%);
    }

    .orb {
      position: absolute;
      width: 38vw;
      aspect-ratio: 1;
      right: -16vw;
      bottom: -24vw;
      z-index: -1;
      border: 1px solid rgba(216, 255, 98, .22);
      border-radius: 50%;
      box-shadow: 0 0 90px rgba(216, 255, 98, .06), inset 0 0 90px rgba(216, 255, 98, .04);
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 22px 28px;
      border-bottom: 1px solid var(--line);
      letter-spacing: .12em;
      text-transform: uppercase;
      font-size: 12px;
    }

    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; }
    .brand-mark { width: 9px; height: 9px; background: var(--acid); box-shadow: 0 0 18px var(--acid); }
    .chapter { color: var(--muted); }

    .seals { display: flex; align-items: center; gap: 8px; }
    .seal { width: 28px; height: 3px; background: rgba(243,240,232,.18); }
    .seal.active { background: var(--acid); box-shadow: 0 0 12px rgba(216,255,98,.6); }

    .briefing {
      position: absolute;
      left: clamp(24px, 6vw, 86px);
      top: clamp(92px, 15vh, 150px);
      width: min(610px, calc(100vw - 48px));
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
    }

    .eyebrow {
      margin: 0 0 16px;
      color: var(--acid);
      font: 600 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(42px, 7vw, 92px);
      font-weight: 650;
      letter-spacing: -.055em;
      line-height: .92;
    }

    h1 em { color: var(--violet); font-style: normal; }

    .mission {
      max-width: 560px;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: clamp(15px, 1.6vw, 19px);
      line-height: 1.65;
    }

    .mission strong { color: var(--ink); font-weight: 600; }

    .terminal {
      position: absolute;
      left: clamp(24px, 6vw, 86px);
      bottom: clamp(28px, 7vh, 72px);
      width: min(560px, calc(100vw - 48px));
      padding-top: 15px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font: 13px/1.7 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      transition: opacity .25s ease;
      pointer-events: none;
    }

    .terminal-row { display: flex; gap: 12px; }
    .prompt { color: var(--acid); }
    .hint { color: var(--ink); }

    .space-meter {
      position: absolute;
      right: 28px;
      bottom: 24px;
      color: var(--muted);
      font: 11px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: .08em;
      text-align: right;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity .25s ease;
    }

    .space-meter strong { display: block; color: var(--ink); font-size: 15px; letter-spacing: .04em; }

    .start-note {
      position: fixed;
      z-index: 4;
      left: 50%;
      top: calc(50% - 112px);
      width: min(520px, calc(100vw - 40px));
      margin: 0;
      color: var(--muted);
      font: 600 11px/1.7 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: .12em;
      text-align: center;
      text-transform: uppercase;
      transform: translateX(-50%);
      opacity: .62;
      pointer-events: none;
      transition: opacity .25s ease;
    }

    #fleeing-button {
      position: fixed;
      z-index: 10;
      left: calc(50vw - 140px);
      top: calc(50vh - 39px);
      width: 280px;
      height: 78px;
      border: 1px solid rgba(216,255,98,.55);
      border-radius: 999px;
      color: #11140a;
      background: var(--acid);
      box-shadow: 0 0 0 1px rgba(7,9,15,.45), 0 18px 60px rgba(216,255,98,.17);
      cursor: pointer;
      font-weight: 800;
      letter-spacing: .09em;
      text-transform: uppercase;
      transition: left 130ms cubic-bezier(.2,.8,.2,1), top 130ms cubic-bezier(.2,.8,.2,1), width .2s ease, height .2s ease, border-radius .2s ease, transform .15s ease;
      user-select: none;
      touch-action: manipulation;
    }

    #fleeing-button::after { content: none; }
    #fleeing-button:focus-visible { outline: 3px solid var(--ink); outline-offset: 5px; }

    .trail {
      position: fixed;
      z-index: 3;
      width: 7px;
      height: 7px;
      border: 1px solid rgba(216,255,98,.45);
      border-radius: 50%;
      pointer-events: none;
      animation: vanish .7s ease forwards;
    }

    .cat-runner {
      --cat-run: 0px;
      position: fixed;
      z-index: 9;
      width: 52px;
      height: 32px;
      color: var(--acid);
      pointer-events: none;
      filter: drop-shadow(0 0 7px rgba(216,255,98,.28));
      animation: cat-dash 2.7s cubic-bezier(.22,.66,.34,1) forwards;
    }

    .cat-shape { position: absolute; inset: 0; transform-origin: center; }
    .cat-runner.reverse .cat-shape { transform: scaleX(-1); }
    .cat-body { position: absolute; left: 12px; top: 9px; width: 29px; height: 14px; border: 1px solid currentColor; border-radius: 55% 48% 45% 52%; background: var(--void); }
    .cat-head { position: absolute; left: 36px; top: 5px; width: 14px; height: 15px; border: 1px solid currentColor; border-radius: 45% 45% 50% 50%; background: var(--void); }
    .cat-head::before { content: "^  ^"; position: absolute; left: -1px; top: -9px; color: currentColor; font: 8px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing: 1px; white-space: nowrap; }
    .cat-head::after { content: "··"; position: absolute; left: 3px; top: 3px; color: currentColor; font: 7px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing: 2px; }
    .cat-tail { position: absolute; left: 1px; top: 4px; width: 15px; height: 15px; border-top: 1px solid currentColor; border-left: 1px solid currentColor; border-radius: 70% 0 0; transform: rotate(-18deg); }
    .cat-leg { position: absolute; top: 21px; width: 9px; height: 7px; border-left: 1px solid currentColor; border-bottom: 1px solid currentColor; transform-origin: top left; }
    .cat-leg.a { left: 17px; animation: cat-paw .24s ease-in-out infinite alternate; }
    .cat-leg.b { left: 32px; animation: cat-paw .24s ease-in-out infinite alternate-reverse; }

    @keyframes vanish {
      to { transform: scale(4); opacity: 0; }
    }

    @keyframes cat-dash {
      0% { opacity: 0; transform: translate(-50%,-50%) translateX(0); }
      7% { opacity: .82; }
      88% { opacity: .72; }
      100% { opacity: 0; transform: translate(-50%,-50%) translateX(var(--cat-run)); }
    }

    @keyframes cat-paw { from { transform: rotate(24deg); } to { transform: rotate(-28deg); } }

    body.s-1 .briefing,
    body.s-1 .terminal,
    body.s-1 .start-note,
    body.s-1 .topbar,
    body.s-1 .space-meter { opacity: 0; }

    body.s-1 #fleeing-button {
      left: 0 !important;
      top: 0 !important;
      width: 100vw;
      height: 100dvh;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      font-size: clamp(18px, 5vw, 30px);
    }

    body.s-1 #fleeing-button::after { content: none; }

    .epilogue {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      overflow: auto;
      padding: 32px;
      background:
        radial-gradient(circle at 50% 10%, rgba(216,255,98,.14), transparent 34%),
        var(--void);
    }

    body.s-2 .epilogue { display: grid; }
    body.s-2 .game > :not(.epilogue) { display: none; }

    .epilogue-card { width: min(720px, 100%); text-align: center; }
    .sigil { margin: 0 auto 26px; width: 74px; height: 74px; display: grid; place-items: center; border: 1px solid var(--acid); border-radius: 50%; color: var(--acid); font-size: 30px; box-shadow: 0 0 40px rgba(216,255,98,.13); }
    .solved-label { color: var(--acid); font: 700 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: .18em; text-transform: uppercase; }
    .epilogue h2 { margin: 12px 0 18px; font-size: clamp(36px, 7vw, 72px); line-height: 1; letter-spacing: -.045em; }
    .epilogue p { margin: 0 auto; max-width: 580px; color: var(--muted); font-size: clamp(16px, 2vw, 20px); line-height: 1.65; }
    .epilogue p strong { color: var(--ink); }
    .next-seal { display: inline-flex; align-items: center; gap: 10px; margin-top: 34px; padding: 13px 18px; border: 1px solid var(--line); border-radius: 999px; color: var(--ink); font: 12px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: .08em; text-decoration: none; text-transform: uppercase; transition: border-color .2s ease, color .2s ease; }
    .next-seal:hover { border-color: var(--acid); color: var(--acid); }

    @media (max-width: 760px) {
      .topbar { padding: 18px 20px; }
      .chapter { display: none; }
      .briefing { top: 88px; }
      .terminal { bottom: 80px; }
      .space-meter { right: 20px; bottom: 18px; }
      #fleeing-button { width: 250px; height: 72px; }
    }

    @media (max-height: 620px) and (min-width: 521px) {
      .briefing { top: 86px; }
      h1 { font-size: clamp(38px, 9vh, 64px); }
      .mission { margin-top: 14px; font-size: 14px; }
      .terminal { bottom: 20px; }
    }

    @media (prefers-reduced-motion: reduce) {
      #fleeing-button, .briefing, .terminal, .topbar, .space-meter { transition: none; }
      .trail, .cat-runner { animation: none; opacity: 0; }
    }
  </style>
</head>
<body>
  <main class="game" aria-label="Zeno's Gate">
    <p class="start-note">Visual riddles. No instructions. No prior knowledge required.</p>
    <button id="fleeing-button" type="button">Start Journey</button>

    <section class="epilogue" aria-labelledby="solved-title">
      <div class="epilogue-card">
        <div class="sigil" aria-hidden="true">I</div>
        <div class="solved-label">node_01 // cleared</div>
        <h2 id="solved-title">Space collapsed.</h2>
        <p>The gate needed infinite room. You removed the room.</p>
        <a class="next-seal" href="power-relay.html">Open node 02 →</a>
      </div>
    </section>
  </main>

  <script src="runtime-a1.min.js"></script>
  <script src="i18n.js"></script>
</body>
</html>
